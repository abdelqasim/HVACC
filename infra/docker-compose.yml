

services:
  # PostgreSQL database for MLflow
  postgres:
    image: postgres:13
    container_name: hvac_fdd_postgres
    environment:
      POSTGRES_DB: mlflow_db
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: mlflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hvac_fdd_network

  # MLflow tracking server
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: hvac_fdd_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_STORE_URI: postgresql://mlflow_user:mlflow_password@postgres:5432/mlflow_db
      DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5001:5000"
    command: mlflow server --backend-store-uri postgresql://mlflow_user:mlflow_password@postgres:5432/mlflow_db --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    networks:
      - hvac_fdd_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI inference service
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: hvac_fdd_api
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - ../:/app
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "8000:8000"
    command: python -m uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - hvac_fdd_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Streamlit UI
  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    container_name: hvac_fdd_ui
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
    volumes:
      - ../:/app
    ports:
      - "8501:8501"
    command: streamlit run services/ui/app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - hvac_fdd_network

volumes:
  postgres_data:
  mlflow_artifacts:
networks:
  hvac_fdd_network:
    driver: bridge
